name: Update Stock Prices

on:
  schedule:
    # Hourly during market hours (9:30 AM - 4:00 PM ET = 13:30 - 20:00 UTC)
    # 48 tickers × 1 req each = 48 req/run. 250/day limit = ~5 runs/day max.
    # So: hourly during 6-hour market window = 7 runs/day = 336 requests. Still over.
    # Adjust: every 2 hours during market hours = 4 runs/day = 192 requests. Safe.
    - cron: '0 13,15,17,19 * * 1-5'  # 13:00, 15:00, 17:00, 19:00 UTC (market hours)
    - cron: '30 20 * * 1-5'          # Market close snapshot
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch stock prices and update data.js
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          node scripts/update-prices.js

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.js
          git diff --staged --quiet || git commit -m "chore(prices): auto-update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
