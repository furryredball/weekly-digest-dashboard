<style>

:root{
/* Notion-inspired warm palette — locked, no dark mode */
--bg:#fbfaf7;--surface:#ffffff;--surface-2:#f6f5f1;--surface-3:#efede7;
--border:#e7e4dd;--border-strong:#d6d2c7;
--text:#37352f;--text-muted:#787774;--text-faint:#b6b4ad;
--accent:#787774;--accent-light:#efede7;
--success:#4d7c5e;--success-light:#e8f0ea;
--warning:#b08d4a;--warning-light:#f5eeda;
--error:#b34747;--error-light:#f5e7e7;
--purple:#8b7dbe;--purple-light:#f0edf8;
--teal:#4a7d8b;--teal-light:#e8eff1;
--tier1:#37352f;--tier2:#787774;--tier3:#b08d4a;--tier4:#8b7dbe;
--radius-sm:4px;--radius-md:6px;--radius-lg:8px;
--shadow:0 1px 2px rgba(0,0,0,0.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;color:var(--text);background:var(--bg);min-height:100vh;font-feature-settings:'tnum' 1;}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}

/* SIDEBAR */
.app{display:flex;min-height:100vh;align-items:flex-start;}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:24px 12px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;transition:transform 0.25s ease;}
.sidebar-logo{font-size:15px;font-weight:600;letter-spacing:-0.01em;padding:0 8px 20px;display:flex;align-items:center;gap:10px;}
.logo-mark{width:28px;height:28px;background:var(--text);border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--surface);font-weight:700;font-size:13px;}
.logo-sub{font-size:11px;color:var(--text-muted);font-weight:400;margin-top:1px;}
.nav-section{font-size:10px;font-weight:600;color:var(--text-faint);letter-spacing:0.08em;text-transform:uppercase;padding:16px 8px 4px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--radius-sm);font-size:13px;color:var(--text-muted);cursor:pointer;margin-bottom:1px;font-weight:400;transition:background 0.15s,color 0.15s;}
.nav-item:hover{background:var(--surface-2);color:var(--text);}
.nav-item.active{background:var(--surface-3);color:var(--text);font-weight:500;}
.nav-item svg{width:14px;height:14px;flex-shrink:0;opacity:0.5;}
.nav-item:hover svg{opacity:0.8;}
.nav-badge{margin-left:auto;font-size:11px;font-weight:500;color:var(--text-faint);font-variant-numeric:tabular-nums;}
.nav-item-ext{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--radius-sm);font-size:13px;color:var(--text-muted);cursor:pointer;margin-bottom:1px;transition:background .15s,color .15s;}
.nav-item-ext:hover{background:var(--surface-2);color:var(--text);}
.nav-item-ext.active{background:var(--surface-3);color:var(--text);font-weight:500;}
.nav-item-ext svg{width:14px;height:14px;flex-shrink:0;opacity:0.5;}

/* MAIN */
.main{flex:1;min-width:0;padding:32px 40px 64px;max-width:1200px;}
.topbar{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:32px;}
.topbar-left h1{font-size:28px;font-weight:600;letter-spacing:-0.02em;line-height:1.1;}
.topbar-left .subtitle{font-size:13px;color:var(--text-muted);margin-top:4px;font-weight:400;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.icon-btn{width:32px;height:32px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--text-muted);border:1px solid var(--border);}
.icon-btn:hover{background:var(--surface-2);color:var(--text);}
.icon-btn svg{width:15px;height:15px;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px;}
.kpi-card{background:var(--surface);border-radius:var(--radius-md);padding:18px 20px;border:1px solid var(--border);}
.kpi-card.featured{background:var(--surface-3);border-color:var(--border-strong);}
.kpi-label{font-size:11px;font-weight:500;color:var(--text-muted);margin-bottom:6px;}
.kpi-value{font-size:28px;font-weight:600;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;line-height:1;}
.kpi-meta{font-size:11px;color:var(--text-muted);margin-top:6px;font-variant-numeric:tabular-nums;}
.kpi-delta{display:inline-flex;align-items:center;gap:3px;font-weight:500;}
.delta-up{color:var(--success);}.delta-down{color:var(--error);}.delta-neutral{color:var(--text-muted);}

/* SECTION */
.section{margin-bottom:32px;}
.section-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
.section-title{font-size:16px;font-weight:600;letter-spacing:-0.01em;}
.section-meta{font-size:11px;color:var(--text-muted);}

/* SECTOR CARDS */
.sector-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.sector-card{background:var(--surface);border-radius:var(--radius-md);padding:16px 18px;border:1px solid var(--border);cursor:pointer;transition:border-color 0.15s,background 0.15s;}
.sector-card:hover{border-color:var(--border-strong);background:var(--surface-2);}
.sector-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.sector-name{font-size:13px;font-weight:600;}
.sector-tier-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:3px;letter-spacing:0.05em;text-transform:uppercase;}
.tier-1{background:var(--tier1);color:var(--bg);}
.tier-2{background:var(--accent-light);color:var(--accent);}
.tier-3{background:var(--warning-light);color:var(--warning);}
.tier-4{background:var(--purple-light);color:var(--purple);}
.sector-tickers{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.ticker-chip{font-size:11px;font-weight:500;padding:2px 7px;border-radius:3px;background:var(--surface-2);color:var(--text);font-variant-numeric:tabular-nums;}
.ticker-chip.up{background:var(--success-light);color:var(--success);}
.ticker-chip.down{background:var(--error-light);color:var(--error);}
.sector-meta{font-size:10px;color:var(--text-muted);display:flex;justify-content:space-between;}

/* TICKER CARDS */
.ticker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.ticker-card{background:var(--surface);border-radius:var(--radius-md);padding:16px 18px;border:1px solid var(--border);cursor:pointer;transition:border-color 0.15s,background 0.15s;}
.ticker-card:hover{border-color:var(--border-strong);background:var(--surface-2);}
.ticker-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2px;}
.ticker-symbol{font-size:16px;font-weight:600;letter-spacing:-0.01em;font-variant-numeric:tabular-nums;}
.ticker-name{font-size:11px;color:var(--text-muted);margin-bottom:4px;}
.ticker-desc{font-size:11px;color:var(--text);line-height:1.45;margin-bottom:4px;}
.ticker-why{font-size:10px;color:var(--accent);line-height:1.4;padding:4px 8px;background:var(--accent-light);border-radius:var(--radius-sm);margin-bottom:8px;}
.ticker-news-count{font-size:10px;font-weight:500;color:var(--text-muted);font-variant-numeric:tabular-nums;}
.ticker-signal{font-size:12px;color:var(--text);line-height:1.5;padding-top:10px;border-top:1px solid var(--border);margin-top:8px;}
.ticker-signal-label{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;}
/* FUNDAMENTALS ROW */
.ticker-fund-row{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;padding:8px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.ticker-fund{display:inline-flex;flex-direction:column;gap:1px;background:var(--surface-2);padding:4px 8px;border-radius:var(--radius-sm);min-width:54px;}
.ticker-fund-label{font-size:9px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;}
.ticker-fund .up-pos{color:var(--success);font-weight:600;}
.ticker-fund .up-neg{color:var(--error);font-weight:600;}
.ticker-head .ticker-symbol a{color:inherit;text-decoration:none;}
.ticker-head .ticker-symbol a:hover{color:var(--accent);text-decoration:underline;}
.ticker-yahoo{margin-top:8px;text-align:right;}
.ticker-yahoo a{font-size:11px;color:var(--accent);text-decoration:none;font-weight:500;}
.ticker-yahoo a:hover{text-decoration:underline;color:var(--text);}


/* SIGNAL LIST */
.signal-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.signal-col{background:var(--surface);border-radius:var(--radius-md);padding:18px;border:1px solid var(--border);}
.signal-col-head{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;margin-bottom:12px;}
.signal-col-head .dot{width:6px;height:6px;border-radius:50%;}
.dot-include{background:var(--success);}.dot-exclude{background:var(--error);}
.signal-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-top:1px solid var(--border);}
.signal-row:first-of-type{border-top:none;}
.signal-ticker{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;}
.signal-tag{font-size:10px;color:var(--text-muted);font-weight:400;}
.signal-upside{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;}
.upside-up{color:var(--success);}.upside-down{color:var(--error);}

/* BUCKET BARS */
.bucket-bars{background:var(--surface);border-radius:var(--radius-md);padding:18px;border:1px solid var(--border);}
.bucket-row{display:flex;align-items:center;gap:10px;padding:6px 0;}
.bucket-label{font-size:12px;font-weight:500;width:100px;}
.bucket-bar-wrap{flex:1;height:4px;background:var(--surface-3);border-radius:2px;overflow:hidden;}
.bucket-bar{height:100%;background:var(--text-muted);border-radius:2px;transition:width 0.8s cubic-bezier(0.16,1,0.3,1);}
.bucket-val{font-size:12px;font-weight:600;width:28px;text-align:right;font-variant-numeric:tabular-nums;color:var(--text-muted);}

/* LINUS TAKE */
.linus-overview{background:var(--surface);border-radius:var(--radius-md);padding:20px 24px;border:1px solid var(--border);margin-bottom:20px;border-left:3px solid var(--accent);}
.linus-overview-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:0.03em;text-transform:uppercase;}
.linus-overview-body{display:flex;flex-direction:column;gap:12px;}
.linus-overview-item{display:flex;align-items:flex-start;gap:10px;font-size:13px;line-height:1.65;color:var(--text);}
.linus-dot{width:5px;height:5px;border-radius:50%;background:var(--text-muted);flex-shrink:0;margin-top:8px;}

/* PRICE / SCORE IN DETAIL */
.detail-price-row{display:flex;align-items:center;gap:16px;margin-bottom:16px;padding:12px 16px;background:var(--surface-2);border-radius:8px;}
.detail-price{font-size:24px;font-weight:600;}
.detail-trend{font-size:14px;color:var(--text-muted);}
.detail-score-badge{font-size:12px;padding:4px 10px;border-radius:12px;font-weight:600;}
.grade-A{background:#1b5e20;color:#fff;}
.grade-B-plus{background:#2e7d32;color:#fff;}
.grade-B{background:#f9a825;color:#000;}
.grade-B-minus{background:#ef6c00;color:#fff;}
.grade-C-plus{background:#d84315;color:#fff;}

/* SCORING PAGE */
.scoring-section{margin-bottom:28px;}
.scoring-section h2{font-size:16px;font-weight:600;margin-bottom:10px;}
.scoring-section p{font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:8px;}
.scoring-dims{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:20px;}
.scoring-dim{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 16px;}
.scoring-dim-name{font-size:12px;font-weight:600;margin-bottom:2px;}
.scoring-dim-pts{font-size:20px;font-weight:600;color:var(--text-muted);}
.scoring-dim-desc{font-size:10px;color:var(--text-faint);margin-top:2px;}
.grade-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:20px;}
.grade-table th,.grade-table td{padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);}
.grade-table th{font-weight:600;color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:0.05em;}
.rank-table{width:100%;border-collapse:collapse;font-size:12px;}
.rank-table th{padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);font-weight:600;color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:0.05em;}
.rank-table td{padding:6px 10px;border-bottom:1px solid var(--border);}
.rank-num{color:var(--text-faint);font-weight:500;width:24px;text-align:right;}

/* TICKER CARD PRICE */
.ticker-price-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:12px;}
.ticker-price{font-weight:600;font-variant-numeric:tabular-nums;}
.ticker-price-up{color:var(--success);}
.ticker-price-down{color:var(--error);}
.ticker-score{font-size:9px;padding:1px 6px;border-radius:8px;font-weight:600;margin-left:auto;}

/* DETAIL VIEW */
.panel-view{display:none;}
.panel-view.active{display:block;}
.back-btn{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--text-muted);cursor:pointer;margin-bottom:16px;font-weight:400;background:none;border:none;padding:0;}
.back-btn:hover{color:var(--text);text-decoration:underline;}
.detail-head{background:var(--surface);border-radius:var(--radius-md);padding:24px;border:1px solid var(--border);margin-bottom:20px;}
.detail-head-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;}
.detail-symbol{font-size:36px;font-weight:600;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;}
.detail-name{font-size:14px;color:var(--text-muted);}
.detail-desc{font-size:13px;color:var(--text);line-height:1.5;margin-top:8px;padding:0 0 4px 0;}
.detail-why{font-size:12px;color:var(--accent);line-height:1.5;padding:8px 10px;background:var(--accent-light);border-radius:var(--radius-sm);margin:8px 0 12px 0;}
.detail-news-list{background:var(--surface);border-radius:var(--radius-md);border:1px solid var(--border);overflow:hidden;}
.detail-news-item{padding:14px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;}
.detail-news-item:last-child{border-bottom:none;}
.detail-news-item:hover{background:var(--surface-2);}
.detail-news-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:10px;color:var(--text-muted);}
.detail-news-source{font-weight:600;color:var(--text);}
.detail-news-title{font-size:13px;font-weight:400;line-height:1.4;}

/* MOBILE */
.menu-toggle{display:none;}
.sidebar-overlay{display:none;}
@media (max-width:1024px){.kpi-grid{grid-template-columns:repeat(2,1fr);}.signal-list{grid-template-columns:1fr;}}
@media (max-width:768px){
.menu-toggle{display:flex;position:fixed;top:12px;left:12px;z-index:99;width:36px;height:36px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);align-items:center;justify-content:center;color:var(--text);}
.sidebar-overlay{display:block;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:50;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.sidebar-overlay.active{opacity:1;pointer-events:auto;}
.sidebar{position:fixed;left:0;top:0;z-index:60;transform:translateX(-100%);width:260px;}
.sidebar.open{transform:translateX(0);}
.main{padding:56px 16px 48px;}
.topbar-left h1{font-size:22px;}
.kpi-value{font-size:22px;}
}

</style>

<script>
// NAV BADGES — dynamic from SECTORS[] / INCLUDE[] / EXCLUDE[] / TICKERS[]
// Replaces hardcoded counts. Single source of truth = data.js.
(function(){
  try {
    document.querySelectorAll('[data-sector]').forEach(function(el){
      var sec = el.getAttribute('data-sector');
      if (typeof SECTORS !== 'undefined' && SECTORS[sec]) {
        el.textContent = SECTORS[sec].length;
      }
    });
    document.querySelectorAll('[data-static="include"]').forEach(function(el){
      if (typeof INCLUDE !== 'undefined') el.textContent = INCLUDE.length;
    });
    document.querySelectorAll('[data-static="exclude"]').forEach(function(el){
      if (typeof EXCLUDE !== 'undefined') el.textContent = EXCLUDE.length;
    });
    document.querySelectorAll('[data-static="total"]').forEach(function(el){
      if (typeof TICKERS !== 'undefined') el.textContent = TICKERS.length;
    });
  } catch(e) { console.error('[nav-badge]', e); }
})();
</script>
